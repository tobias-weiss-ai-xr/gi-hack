services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-password}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  bootstrap:
    image: node:22-alpine
    profiles:
      - bootstrap
    working_dir: /app
    volumes:
      - ./packages/server:/app
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
    command:
      - /bin/sh
      - -c
      - |
        echo "Waiting for Neo4j..."
        apk add --no-cache curl >/dev/null 2>&1
        until curl -sf http://neo4j:7474 >/dev/null 2>&1; do sleep 2; done
        sleep 5
        echo "Loading bootstrap data..."
        npx --yes tsx src/scripts/run-bootstrap.ts
        echo "Bootstrap complete!"
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
