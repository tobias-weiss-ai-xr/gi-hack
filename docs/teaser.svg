<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.8" fill="#334155"/>
  </pattern>
  <rect width="800" height="400" fill="url(#dots)"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0">AI Graph Pipeline CRM</text>
  <text x="400" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Agentic Outreach Workflow</text>

  <!-- Pipeline Stages -->
  <g transform="translate(40, 90)">
    <!-- Stage 1: Qualify -->
    <rect x="0" y="0" width="110" height="90" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="55" y="28" text-anchor="middle" font-family="system-ui" font-size="10" fill="#3b82f6" font-weight="600">QUALIFY</text>
    <text x="55" y="44" text-anchor="middle" font-family="system-ui" font-size="8" fill="#64748b">Score companies</text>
    <text x="55" y="56" text-anchor="middle" font-family="system-ui" font-size="8" fill="#64748b">HOT / WARM / COLD</text>
    <circle cx="55" cy="75" r="8" fill="#3b82f6" opacity="0.2"/>
    <text x="55" y="79" text-anchor="middle" font-family="system-ui" font-size="8" fill="#3b82f6">1</text>

    <!-- Arrow -->
    <line x1="115" y1="45" x2="140" y2="45" stroke="#334155" stroke-width="1.5"/>
    <polygon points="140,41 148,45 140,49" fill="#334155"/>

    <!-- Stage 2: Find -->
    <rect x="152" y="0" width="110" height="90" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="207" y="28" text-anchor="middle" font-family="system-ui" font-size="10" fill="#8b5cf6" font-weight="600">FIND</text>
    <text x="207" y="44" text-anchor="middle" font-family="system-ui" font-size="8" fill="#64748b">LLM → Scrape</text>
    <text x="207" y="56" text-anchor="middle" font-family="system-ui" font-size="8" fill="#64748b">LinkedIn → Pattern</text>
    <circle cx="207" cy="75" r="8" fill="#8b5cf6" opacity="0.2"/>
    <text x="207" y="79" text-anchor="middle" font-family="system-ui" font-size="8" fill="#8b5cf6">2</text>

    <!-- Arrow -->
    <line x1="267" y1="45" x2="292" y2="45" stroke="#334155" stroke-width="1.5"/>
    <polygon points="292,41 300,45 292,49" fill="#334155"/>

    <!-- Stage 3: Write -->
    <rect x="304" y="0" width="110" height="90" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="359" y="28" text-anchor="middle" font-family="system-ui" font-size="10" fill="#10b981" font-weight="600">EMAIL</text>
    <text x="359" y="44" text-anchor="middle" font-family="system-ui" font-size="8" fill="#64748b">AI-generated</text>
    <text x="359" y="56" text-anchor="middle" font-family="system-ui" font-size="8" fill="#64748b">personalized draft</text>
    <circle cx="359" cy="75" r="8" fill="#10b981" opacity="0.2"/>
    <text x="359" y="79" text-anchor="middle" font-family="system-ui" font-size="8" fill="#10b981">3</text>

    <!-- Arrow -->
    <line x1="419" y1="45" x2="444" y2="45" stroke="#334155" stroke-width="1.5"/>
    <polygon points="444,41 452,45 444,49" fill="#334155"/>

    <!-- Stage 4: Confirm -->
    <rect x="456" y="0" width="130" height="90" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="521" y="28" text-anchor="middle" font-family="system-ui" font-size="10" fill="#f59e0b" font-weight="600">CONFIRM</text>
    <text x="521" y="44" text-anchor="middle" font-family="system-ui" font-size="8" fill="#64748b">Customer preference</text>
    <text x="521" y="56" text-anchor="middle" font-family="system-ui" font-size="8" fill="#64748b">landing page</text>
    <circle cx="521" cy="75" r="8" fill="#f59e0b" opacity="0.2"/>
    <text x="521" y="79" text-anchor="middle" font-family="system-ui" font-size="8" fill="#f59e0b">4</text>
  </g>

  <!-- Neo4j Graph Visualization -->
  <g transform="translate(40, 220)">
    <rect x="0" y="0" width="720" height="150" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="360" y="22" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b" font-weight="600">NEO4J GRAPH</text>

    <!-- Nodes -->
    <circle cx="100" cy="80" r="28" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="100" y="77" text-anchor="middle" font-family="system-ui" font-size="8" fill="#60a5fa" font-weight="600">Company</text>
    <text x="100" y="90" text-anchor="middle" font-family="system-ui" font-size="7" fill="#64748b">1,306</text>

    <circle cx="200" cy="50" r="22" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="200" y="47" text-anchor="middle" font-family="system-ui" font-size="7" fill="#a78bfa" font-weight="600">Signal</text>
    <text x="200" y="58" text-anchor="middle" font-family="system-ui" font-size="6" fill="#64748b">1,753</text>

    <circle cx="360" cy="80" r="28" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
    <text x="360" y="77" text-anchor="middle" font-family="system-ui" font-size="8" fill="#34d399" font-weight="600">Contact</text>
    <text x="360" y="90" text-anchor="middle" font-family="system-ui" font-size="7" fill="#64748b">Many</text>

    <circle cx="520" cy="50" r="22" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="520" y="47" text-anchor="middle" font-family="system-ui" font-size="7" fill="#fbbf24" font-weight="600">Activity</text>
    <text x="520" y="58" text-anchor="middle" font-family="system-ui" font-size="6" fill="#64748b">57</text>

    <circle cx="620" cy="80" r="22" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
    <text x="620" y="77" text-anchor="middle" font-family="system-ui" font-size="7" fill="#f87171" font-weight="600">Product</text>
    <text x="620" y="88" text-anchor="middle" font-family="system-ui" font-size="6" fill="#64748b">9</text>

    <!-- Edges -->
    <line x1="126" y1="68" x2="180" y2="56" stroke="#334155" stroke-width="1"/>
    <line x1="126" y1="90" x2="334" y2="84" stroke="#334155" stroke-width="1"/>
    <line x1="196" y1="72" x2="156" y2="78" stroke="#334155" stroke-width="1"/>
    <line x1="386" y1="78" x2="500" y2="60" stroke="#334155" stroke-width="1"/>
    <line x1="386" y1="90" x2="600" y2="84" stroke="#334155" stroke-width="1"/>
    <line x1="540" y1="62" x2="606" y2="76" stroke="#334155" stroke-width="1"/>
  </g>

  <!-- Pipeline Kanban bar -->
  <g transform="translate(40, 140)">
    <text x="360" y="12" text-anchor="middle" font-family="system-ui" font-size="11" fill="#64748b" font-weight="600">PIPELINE CRM</text>
    <rect x="0" y="20" width="110" height="24" rx="4" fill="#1e3a5f"/>
    <text x="55" y="36" text-anchor="middle" font-family="system-ui" font-size="9" fill="#60a5fa">New</text>
    <rect x="118" y="20" width="110" height="24" rx="4" fill="#1e3a5f"/>
    <text x="173" y="36" text-anchor="middle" font-family="system-ui" font-size="9" fill="#60a5fa">Contacted</text>
    <rect x="236" y="20" width="110" height="24" rx="4" fill="#1e3a5f"/>
    <text x="291" y="36" text-anchor="middle" font-family="system-ui" font-size="9" fill="#60a5fa">Meeting</text>
    <rect x="354" y="20" width="110" height="24" rx="4" fill="#4a2e1a"/>
    <text x="409" y="36" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fbbf24">Proposal</text>
    <rect x="472" y="20" width="110" height="24" rx="4" fill="#1a3d2a"/>
    <text x="527" y="36" text-anchor="middle" font-family="system-ui" font-size="9" fill="#34d399">Closed Won</text>
    <rect x="590" y="20" width="110" height="24" rx="4" fill="#3d1a1a"/>
    <text x="645" y="36" text-anchor="middle" font-family="system-ui" font-size="9" fill="#f87171">Closed Lost</text>
    <!-- Arrow between stages -->
    <line x1="52" y1="16" x2="52" y2="14" stroke="none"/>
  </g>

  <!-- Footer -->
  <text x="400" y="385" text-anchor="middle" font-family="system-ui" font-size="9" fill="#334155">GI-Hack · Neo4j · React · TypeScript · AI Agentic Outreach</text>
</svg>
