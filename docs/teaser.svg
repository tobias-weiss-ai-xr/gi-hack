<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#182235"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" fill="url(#bg)" rx="16"/>
  <rect x="0" y="0" width="1000" height="3" fill="url(#accent)"/>

  <!-- Signature dots -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.6" fill="#1e293b"/>
  </pattern>
  <rect width="1000" height="520" fill="url(#dots)" rx="16"/>

  <!-- ===== HEADER ===== -->
  <text x="500" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#f1f5f9" letter-spacing="0.4">AI Graph Pipeline CRM</text>
  <text x="500" y="66" text-anchor="middle" font-size="12" fill="#64748b" letter-spacing="0.5">Agentic Outreach Workflow — Neo4j · React 19 · TypeScript</text>

  <!-- ===== 3-STAGE FLOW ===== -->
  <g transform="translate(0, 90)">

    <!-- Section label -->
    <text x="50" y="0" font-size="10" fill="#475569" font-weight="600" letter-spacing="1.2">OUTREACH PIPELINE</text>
    <rect x="50" y="8" width="900" height="1" fill="#1e293b"/>

    <!-- Flow arrows -->
    <line x1="340" y1="80" x2="398" y2="80" stroke="#334155" stroke-width="2"/>
    <polygon points="398,76 410,80 398,84" fill="#475569"/>
    <line x1="665" y1="80" x2="723" y2="80" stroke="#334155" stroke-width="2"/>
    <polygon points="723,76 735,80 723,84" fill="#475569"/>

    <!-- ========= STAGE 1: FIND ========= -->
    <g>
      <rect x="40" y="20" width="290" height="190" rx="12" fill="url(#card)" stroke="#3b82f6" stroke-width="1.5"/>
      <!-- Header bar -->
      <path d="M40,32 Q40,20 52,20 L318,20 Q330,20 330,32 L330,52 L40,52 Z" fill="url(#blue)" opacity="0.12"/>
      <circle cx="62" cy="36" r="9" fill="url(#blue)"/>
      <text x="62" y="40" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">1</text>
      <text x="78" y="41" font-size="15" fill="#60a5fa" font-weight="600">FIND</text>
      <text x="125" y="41" font-size="11" fill="#475569">Contact Discovery</text>

      <!-- Content cards -->
      <rect x="56" y="66" width="258" height="22" rx="5" fill="#1e3a5f" opacity="0.5"/>
      <text x="68" y="81" font-size="10" fill="#93c5fd" font-weight="500">LLM Contact Strategy</text>
      <text x="290" y="81" text-anchor="end" font-size="9" fill="#475569">primary</text>

      <rect x="56" y="92" width="258" height="22" rx="5" fill="#1e3a5f" opacity="0.5"/>
      <text x="68" y="107" font-size="10" fill="#93c5fd" font-weight="500">Web Scrape Strategy</text>
      <text x="290" y="107" text-anchor="end" font-size="9" fill="#475569">real emails</text>

      <rect x="56" y="118" width="258" height="22" rx="5" fill="#1e3a5f" opacity="0.5"/>
      <text x="68" y="133" font-size="10" fill="#93c5fd" font-weight="500">LinkedIn Strategy</text>
      <text x="290" y="133" text-anchor="end" font-size="9" fill="#475569">Playwright</text>

      <rect x="56" y="144" width="258" height="22" rx="5" fill="#1e3a5f" opacity="0.5"/>
      <text x="68" y="159" font-size="10" fill="#93c5fd" font-weight="500">Pattern Email Strategy</text>
      <text x="290" y="159" text-anchor="end" font-size="9" fill="#475569">fallback</text>

      <!-- Strategy chain badge -->
      <rect x="56" y="176" width="258" height="22" rx="5" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="185" y="191" text-anchor="middle" font-size="9" fill="#64748b">Pluggable chain — stops at first result</text>
    </g>

    <!-- ========= STAGE 2: QUALIFY ========= -->
    <g >
      <rect x="360" y="20" width="290" height="190" rx="12" fill="url(#card)" stroke="#8b5cf6" stroke-width="1.5"/>
      <path d="M360,32 Q360,20 372,20 L638,20 Q650,20 650,32 L650,52 L360,52 Z" fill="url(#purple)" opacity="0.12"/>
      <circle cx="382" cy="36" r="9" fill="url(#purple)"/>
      <text x="382" y="40" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">2</text>
      <text x="398" y="41" font-size="15" fill="#a78bfa" font-weight="600">QUALIFY</text>
      <text x="455" y="41" font-size="11" fill="#475569">Score &amp; Tier</text>

      <rect x="376" y="66" width="258" height="44" rx="6" fill="#2e1065" opacity="0.3"/>
      <text x="390" y="84" font-size="10" fill="#c4b5fd" font-weight="500">Scorer Engine</text>
      <text x="390" y="100" font-size="9" fill="#64748b">Scans 1,306 companies from Neo4j graph</text>

      <!-- Tier badges -->
      <rect x="376" y="118" width="80" height="24" rx="6" fill="#065f46" opacity="0.3"/>
      <text x="416" y="134" text-anchor="middle" font-size="10" fill="#34d399" font-weight="700">HOT</text>

      <rect x="462" y="118" width="80" height="24" rx="6" fill="#78350f" opacity="0.3"/>
      <text x="502" y="134" text-anchor="middle" font-size="10" fill="#fbbf24" font-weight="700">WARM</text>

      <rect x="548" y="118" width="86" height="24" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="591" y="134" text-anchor="middle" font-size="10" fill="#64748b" font-weight="600">COLD</text>

      <text x="505" y="156" text-anchor="middle" font-size="9" fill="#475569">Score 0–100 per company</text>

      <rect x="376" y="172" width="258" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="505" y="189" text-anchor="middle" font-size="9" fill="#64748b">1 HOT + 5 WARM qualified out of 1,306</text>
    </g>

    <!-- ========= STAGE 3: CONVERT ========= -->
    <g >
      <rect x="680" y="20" width="280" height="190" rx="12" fill="url(#card)" stroke="#10b981" stroke-width="1.5"/>
      <path d="M680,32 Q680,20 692,20 L948,20 Q960,20 960,32 L960,52 L680,52 Z" fill="url(#green)" opacity="0.12"/>
      <circle cx="702" cy="36" r="9" fill="url(#green)"/>
      <text x="702" y="40" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">3</text>
      <text x="718" y="41" font-size="15" fill="#34d399" font-weight="600">CONVERT</text>
      <text x="785" y="41" font-size="11" fill="#475569">Engage &amp; Track</text>

      <!-- Sub-step: AI Email -->
      <rect x="696" y="66" width="248" height="32" rx="6" fill="#064e3b" opacity="0.3"/>
      <circle cx="710" cy="82" r="5" fill="#10b981"/>
      <text x="722" y="79" font-size="10" fill="#6ee7b7" font-weight="500">AI-Generated Outreach Email</text>
      <text x="722" y="92" font-size="8.5" fill="#64748b">Local LLM (Ollama/LocalAI) · Personalized draft</text>

      <!-- Sub-step: Consent -->
      <rect x="696" y="104" width="248" height="32" rx="6" fill="#064e3b" opacity="0.3"/>
      <circle cx="710" cy="120" r="5" fill="#10b981"/>
      <text x="722" y="117" font-size="10" fill="#6ee7b7" font-weight="500">Customer Consent Page</text>
      <text x="722" y="130" font-size="8.5" fill="#64748b">One-time token · GDPR compliant</text>

      <!-- Sub-step: Pipeline CRM -->
      <rect x="696" y="142" width="248" height="32" rx="6" fill="#064e3b" opacity="0.3"/>
      <circle cx="710" cy="158" r="5" fill="#10b981"/>
      <text x="722" y="155" font-size="10" fill="#6ee7b7" font-weight="500">Pipeline CRM Kanban</text>
      <text x="722" y="168" font-size="8.5" fill="#64748b">6 stages · 57 activities · 10 demo leads</text>

      <!-- Demo note -->
      <rect x="696" y="182" width="248" height="18" rx="5" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="820" y="194" text-anchor="middle" font-size="8.5" fill="#475569">npm run demo:pipeline</text>
    </g>
  </g>

  <!-- ===== BOTTOM: TECH STACK + STATS ===== -->
  <g transform="translate(0, 300)">

    <!-- Tech stack badges -->
    <text x="50" y="0" font-size="10" fill="#475569" font-weight="600" letter-spacing="1.2">TECH STACK</text>
    <rect x="50" y="8" width="900" height="1" fill="#1e293b"/>

    <g transform="translate(40, 20)">
      <rect x="0" y="0" width="125" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="62" y="17" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500">React 19 + Vite</text>

      <rect x="135" y="0" width="140" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="205" y="17" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500">TanStack Router + Query</text>

      <rect x="285" y="0" width="115" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="342" y="17" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500">Tailwind CSS v4</text>

      <rect x="410" y="0" width="100" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="460" y="17" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500">Express + TSX</text>

      <rect x="520" y="0" width="95" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="567" y="17" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500">Neo4j + APOC</text>

      <rect x="625" y="0" width="130" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="690" y="17" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500">Playwright + Docker</text>
    </g>

    <!-- Graph stats -->
    <text x="50" y="75" font-size="10" fill="#475569" font-weight="600" letter-spacing="1.2">NEO4J GRAPH STATE</text>
    <rect x="50" y="83" width="900" height="1" fill="#1e293b"/>

    <g transform="translate(40, 96)">
      <!-- Bar: Companies -->
      <rect x="0" y="0" width="920" height="20" rx="4" fill="#1e293b"/>
      <rect x="0" y="0" width="400" height="20" rx="4" fill="#3b82f6" opacity="0.3"/>
      <rect x="0" y="0" width="3" height="20" rx="1.5" fill="#3b82f6"/>
      <text x="12" y="14" font-size="10" fill="#94a3b8" font-weight="500">Companies</text>
      <text x="380" y="14" text-anchor="end" font-size="10" fill="#60a5fa" font-weight="700">1,306</text>

      <!-- Bar: Signals -->
      <rect x="0" y="24" width="920" height="20" rx="4" fill="#1e293b"/>
      <rect x="0" y="24" width="320" height="20" rx="4" fill="#8b5cf6" opacity="0.3"/>
      <rect x="0" y="24" width="3" height="20" rx="1.5" fill="#8b5cf6"/>
      <text x="12" y="38" font-size="10" fill="#94a3b8" font-weight="500">Signals</text>
      <text x="300" y="38" text-anchor="end" font-size="10" fill="#a78bfa" font-weight="700">1,753</text>

      <!-- Bar: Products -->
      <rect x="0" y="48" width="920" height="20" rx="4" fill="#1e293b"/>
      <rect x="0" y="48" width="180" height="20" rx="4" fill="#10b981" opacity="0.3"/>
      <rect x="0" y="48" width="3" height="20" rx="1.5" fill="#10b981"/>
      <text x="12" y="62" font-size="10" fill="#94a3b8" font-weight="500">Products</text>
      <text x="160" y="62" text-anchor="end" font-size="10" fill="#34d399" font-weight="700">9</text>

      <!-- Bar: Activities -->
      <rect x="0" y="72" width="920" height="20" rx="4" fill="#1e293b"/>
      <rect x="0" y="72" width="140" height="20" rx="4" fill="#f59e0b" opacity="0.3"/>
      <rect x="0" y="72" width="3" height="20" rx="1.5" fill="#f59e0b"/>
      <text x="12" y="86" font-size="10" fill="#94a3b8" font-weight="500">Activities</text>
      <text x="120" y="86" text-anchor="end" font-size="10" fill="#fbbf24" font-weight="700">57</text>

      <!-- Bar: Relationships -->
      <rect x="0" y="96" width="920" height="20" rx="4" fill="#1e293b"/>
      <rect x="0" y="96" width="260" height="20" rx="4" fill="#ef4444" opacity="0.3"/>
      <rect x="0" y="96" width="3" height="20" rx="1.5" fill="#ef4444"/>
      <text x="12" y="110" font-size="10" fill="#94a3b8" font-weight="500">Relationships</text>
      <text x="240" y="110" text-anchor="end" font-size="10" fill="#f87171" font-weight="700">3,515</text>
    </g>
  </g>
</svg>
